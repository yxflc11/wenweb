    <meta name="theme-color" content="#0e0e0d" media="(prefers-color-scheme: dark)" />

    <title>Bingwen He — Design & Engineering</title>
    <meta

    />

    <!-- Open Graph / social -->

    <meta
      property="og:description"
      content="Design engineer working on AI automation and prompt systems. Thinking in systems, building with care."
    />
    <meta property="og:url" content="https://bingwenhe.com/" />
    <meta property="og:image" content="https://bingwenhe.com/concepts/portfolio-concept.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <link
      href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,200..800&family=Space+Grotesk:wght@300..700&family=Space+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <script>
      // Set the theme before first paint to avoid a flash of the wrong palette.
      (function () {
        try {
          var saved = localStorage.getItem("bw-theme");
          var theme =
            saved === "light" || saved === "dark"
              ? saved
              : window.matchMedia("(prefers-color-scheme: dark)").matches
              ? "dark"
              : "light";
          document.documentElement.dataset.theme = theme;
        } catch (e) {
          document.documentElement.dataset.theme = "light";
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
